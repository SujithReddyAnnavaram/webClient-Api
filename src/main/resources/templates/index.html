<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourist Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5rem;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmin(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
            font-size: 0.9rem;
        }

        input[type="text"],
        input[type="number"] {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-update {
            background: #4CAF50;
            color: white;
            padding: 8px 16px;
            font-size: 0.85rem;
        }

        .btn-update:hover {
            background: #45a049;
        }

        .btn-delete {
            background: #f44336;
            color: white;
            padding: 8px 16px;
            font-size: 0.85rem;
        }

        .btn-delete:hover {
            background: #da190b;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        tbody tr {
            transition: background-color 0.3s;
        }

        tbody tr:hover {
            background-color: #f5f5f5;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .update-form {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .update-form input[type="number"] {
            width: 120px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 0.85rem;
            }

            th, td {
                padding: 10px;
            }

            .actions {
                flex-direction: column;
            }
            
            .update-form {
                flex-direction: column;
                width: 100%;
            }
            
            .update-form input[type="number"] {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌍 Tourist Management System</h1>
            <p class="subtitle">Manage your tourist packages efficiently</p>
        </header>

        <!-- Add Tourist Form -->
        <div class="card">
            <h2>➕ Add New Tourist</h2>
            <form th:action="@{/add}" method="POST">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="name">Name *</label>
                        <input type="text" id="name" name="name" required placeholder="Enter tourist name">
                    </div>
                    <div class="form-group">
                        <label for="tourPackage">Tour Package *</label>
                        <input type="text" id="tourPackage" name="tourPackage" required placeholder="e.g., European Adventure">
                    </div>
                    <div class="form-group">
                        <label for="cost">Cost (£) *</label>
                        <input type="number" id="cost" name="cost" step="0.01" required placeholder="0.00">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Add Tourist</button>
            </form>
        </div>

        <!-- Tourist List -->
        <div class="card">
            <h2>📋 Tourist List</h2>
            
            <div th:if="${message != null and !message.isEmpty()}">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Tour Package</th>
                            <th>Cost (£)</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="tourist : ${message}">
                            <td th:text="${tourist.id}">1</td>
                            <td th:text="${tourist.name}">John Doe</td>
                            <td th:text="${tourist.tourPackage}">Paris Adventure</td>
                            <td th:text="${'£' + #numbers.formatDecimal(tourist.cost, 1, 2)}">£1500.00</td>
                            <td>
                                <div class="actions">
                                    <form th:action="@{/update-Budget}" method="POST" class="update-form">
                                        <input type="hidden" name="id" th:value="${tourist.id}">
                                        <input type="number" name="budget" step="0.01" placeholder="New cost" required>
                                        <button type="submit" class="btn btn-update">Update</button>
                                    </form>
                                    <form th:action="@{/delete/{id}(id=${tourist.id})}" method="POST">
                                        <button type="submit" class="btn btn-delete" onclick="return confirm('Are you sure you want to delete this tourist?')">Delete</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div th:if="${message == null or message.isEmpty()}" class="empty-state">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
                </svg>
                <h3>No tourists found</h3>
                <p>Start by adding a new tourist above</p>
            </div>
        </div>
    </div>
</body>
</html>
